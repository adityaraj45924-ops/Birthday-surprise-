<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Surprise 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    text-align: center;
}

/* Login Page */
#loginPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    background: black;
    color: white;
}

input {
    padding: 12px;
    font-size: 18px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Main Page */
#mainPage {
    display: none;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-size: cover;
    background-position: center;
    position: relative;
    color: white;
}

.moon {
    position: fixed;
    top: 10px;
    right: 15px;
    font-size: 55px;
}

.star {
    position: fixed;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

.shooting {
    position: fixed;
    font-size: 22px;
    animation: shoot 2s linear forwards;
}

@keyframes shoot {
    0% { transform: translate(0,0); opacity: 1; }
    100% { transform: translate(-300px, 300px); opacity: 0; }
}

.fall {
    position: absolute;
    top: -50px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(0); }
    100% { transform: translateY(100vh); }
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 60px;
}
</style>

</head>

<body>

<!-- Login Page -->
<div id="loginPage">
    <h1>🔐 Enter Secret 💖</h1>

    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="date" id="date"><br>

    <button onclick="checkLogin()">Enter ❤️</button>

    <p id="error" style="color:red;"></p>
</div>

<!-- Main Page -->
<div id="mainPage">
    <div class="moon">🌙</div>

    <div class="container">
        <h1 id="text">❤️🌸 This is for you 🌸❤️</h1>
        <br>
        <button onclick="nextStep()">Click Me ❤️</button>
    </div>
</div>

<script>
// LOGIN CHECK
function checkLogin() {
    let name = document.getElementById("name").value;

    if(name.trim().toLowerCase() === "payal dwivedi") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        createStars();
    } else {
        document.getElementById("error").innerText = "❌ Not Verified";
    }
}

// STEPS
let step = 0;

function nextStep() {
    step++;

    if(step === 1) {
        document.getElementById("text").innerHTML = "🎂❤️ Happy Birthday Cutie ❤️💖🎉";
    }
    else if(step === 2) {
        document.getElementById("text").innerHTML = "❤️💘 Your smile is my heart 💘❤️";
    }
    else if(step === 3) {
        document.getElementById("text").innerHTML = `
        <div style="font-size:80px;">❤️ I LIKE YOU ❤️</div>
        <br>
        <div style="font-size:30px;">
        🌸 Teri muskaan meri jaan ban gayi,<br>
        Teri baatein meri pehchaan ban gayi,<br>
        Jo tu paas ho to lagta hai sab mil gaya,<br>
        Tu hi meri chhoti si duniya ban gayi 💖
        </div>
        `;
    }
}

// STARS
function createStars() {
    for(let i = 0; i < 50; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.innerHTML = "⭐";

        star.style.top = Math.random() * 100 + "vh";
        star.style.left = Math.random() * 100 + "vw";
        star.style.fontSize = (15 + Math.random()*20) + "px";

        document.body.appendChild(star);
    }
}

// HEART RAIN
function createRain() {
    const item = document.createElement("div");
    item.classList.add("fall");

    const symbols = ["❤️","💖","💘","💝","🌸"];
    item.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];

    item.style.left = Math.random() * 100 + "vw";
    item.style.fontSize = (35 + Math.random()*40) + "px";
    item.style.animationDuration = (3 + Math.random()*3) + "s";

    document.body.appendChild(item);

    setTimeout(() => item.remove(), 6000);
}
setInterval(createRain, 200);

// SHOOTING STAR
function shootingStar() {
    const star = document.createElement("div");
    star.classList.add("shooting");
    star.innerHTML = "💫";

    star.style.top = Math.random() * 50 + "vh";
    star.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(star);

    setTimeout(() => star.remove(), 2000);
}
setInterval(shootingStar, 2500);

</script>

</body>
</html>
