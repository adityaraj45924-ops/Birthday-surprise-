<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: Arial;
  text-align: center;
  background: black;
  color: white;
}

/* Center box */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Input & Button */
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* Hearts animation */
.heart {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container" id="box">

  <!-- LOGIN PAGE -->
  <div id="login">
    <h2>Enter Password 💖</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="check()">Open Surprise 🎁</button>
  </div>

</div>

<script>

// PASSWORD CHECK
function check(){
  let p = document.getElementById("pass").value;

  if(p === "1234"){
    show1();
  } else {
    alert("Wrong Password 😢");
  }
}

// STEPS
function show1(){
  document.getElementById("box").innerHTML =
  "<h1>Hi Cutie 💖</h1><button onclick='show2()'>Click Me 🌹</button>";
}

function show2(){
  document.getElementById("box").innerHTML =
  "<h1>Happy Birthday 🎂💖</h1><button onclick='show3()'>Next 💕</button>";
}

function show3(){
  document.getElementById("box").innerHTML =
  "<h1>You are very special 💕🌹</h1><button onclick='show4()'>Next 💖</button>";
}

function show4(){
  document.getElementById("box").innerHTML =
  "<h1>I Like You 💘</h1><button onclick='show5()'>Final 🎁</button>";
}

function show5(){
  document.getElementById("box").innerHTML =
  "<h1>You are so cute baby 😘💖🌹</h1>";
}

// HEART ANIMATION
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.className = "heart";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20+10) + "px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove();},5000);
}, 300);

</script>

</body>
</html>
